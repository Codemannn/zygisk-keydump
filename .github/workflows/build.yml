name: Build KeyDump + Patchelf AuthSign + NetdClient
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          echo "NDK=$PWD/android-ndk-r27c" >> $GITHUB_ENV
      - name: Build libkeydump.so
        run: |
          $NDK/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk APP_ABI=arm64-v8a APP_PLATFORM=android-21
      - name: Install patchelf
        run: sudo apt-get update -qq && sudo apt-get install -y -qq patchelf
      - name: Patch libauthSign.so (bundled OpenSSL)
        run: |
          patchelf --add-needed libkeydump.so libauthSign_orig.so
          patchelf --print-needed libauthSign_orig.so | grep keydump
          mv libauthSign_orig.so libauthSign_patched.so
      - name: Patch libnetd_client.so (system Zygote)
        run: |
          patchelf --add-needed /system/lib64/libkeydump.so libnetd_client_orig.so
          patchelf --print-needed libnetd_client_orig.so | grep keydump
          mv libnetd_client_orig.so libnetd_client_patched.so
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: keydump-files
          path: |
            libs/arm64-v8a/libkeydump.so
            libauthSign_patched.so
            libnetd_client_patched.so
